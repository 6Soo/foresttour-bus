<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="숲길따라 감성여행 - 여행 일정표">
    <meta name="theme-color" content="#f2f4f6">
    <meta property="og:title" content="숲길따라 감성여행 · 바이브 일정 만들기">
    <meta property="og:description" content="어떤 양식이든 붙여넣으면 여행 일정표가 돼요 ✨">
    <meta property="og:type" content="website">
    <title>숲길따라 감성여행 · 바이브 일정 만들기</title>
    <script>
        if (window.location.protocol === "http:" && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
            window.location.href = "https://" + window.location.hostname + window.location.pathname + window.location.search + window.location.hash;
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="itinerary.css?v=20260707g">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌲</text></svg>">
</head>
<body class="editing">
    <div class="wrap">
        <header class="top-bar">
            <a href="index.html" class="brand">
                <span class="brand-logo">🌲</span>
                <span class="brand-name">숲길따라 감성여행</span>
            </a>
            <div class="top-actions">
                <button id="paste-open" class="edit-toggle" type="button">📝 붙여넣기</button>
            </div>
        </header>

        <nav class="tool-nav">
            <a href="bus.html">🚌 버스 좌석표</a>
            <a href="itinerary.html" class="active">✨ 바이브 일정</a>
            <a href="import.html">📷 이미지로 일정</a>
            <a href="flight.html">✈️ 항공권 예약</a>
        </nav>

        <div id="shared-banner" class="shared-banner" hidden>
            🔗 공유받은 일정을 보고 있어요
        </div>

        <main id="main">
            <!-- 바이브 랜딩 (일정이 없을 때) -->
            <section id="landing">
                <div class="landing-emoji">✨</div>
                <h1 class="landing-title">바이브 일정 만들기</h1>
                <p class="landing-desc">카페 일정, 단체방 공지, 메모까지.<br>어떤 양식이든 붙여넣으면 일정표가 되고,<br>만든 뒤엔 항목을 터치해서 바로 다듬어요.</p>
                <textarea id="landing-input" class="paste-area" rows="9" placeholder="10시 체크아웃
마루이케 16나한상
점심
加田습원
마트
체크인, 저녁"></textarea>
                <button id="landing-run" class="big-btn landing-cta" type="button">✨ 일정 만들기</button>
                <a class="landing-alt" href="import.html">📷 이미지로 만들기</a>
            </section>

            <!-- 여행 요약 히어로 (제목·날짜가 없으면 접혀 있음 — 버튼으로 펼침) -->
            <button id="hero-open" class="hero-open" type="button" hidden>＋ 여행 이름 · 날짜 넣기</button>
            <section class="hero">
                <div class="hero-deco" aria-hidden="true"></div>
                <p class="hero-eyebrow">TRAVEL ITINERARY</p>
                <h1 id="trip-title" class="hero-title" data-placeholder="여행 이름을 입력하세요"></h1>
                <p id="trip-dates" class="hero-dates"></p>
                <div class="hero-date-edit edit-only">
                    <label for="start-date">출발일</label>
                    <input type="date" id="start-date">
                </div>
                <div id="trip-badges" class="hero-badges"></div>
            </section>

            <!-- 일차별 카드 -->
            <section id="days"></section>

            <button id="add-day" class="add-day edit-only" type="button">＋ 날짜 추가</button>

            <!-- 안내 사항 -->
            <section id="note-card" class="note-card">
                <h3 class="note-title">📌 안내</h3>
                <p id="trip-note" class="note-body" data-placeholder="참가자분들께 안내할 내용을 적어주세요"></p>
            </section>

            <p class="footer-hint">숲길따라 감성여행 · foresttour.kr</p>
        </main>

        <!-- 하단 고정 액션 바 -->
        <footer class="action-bar">
            <button id="kakao-btn" class="btn btn-kakao" type="button">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.6C6.4 2.6 1.8 6.2 1.8 10.6c0 2.85 1.9 5.35 4.75 6.75l-1.1 4.05c-.1.37.3.66.62.45l4.75-3.15c.38.04.78.06 1.18.06 5.6 0 10.2-3.6 10.2-8.16S17.6 2.6 12 2.6z"/></svg>
                카카오톡 공유
            </button>
        </footer>
    </div>

    <!-- 카테고리 선택 바텀시트 -->
    <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
    <div id="cat-sheet" class="sheet" hidden>
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">일정 종류 선택</h3>
        <div id="cat-list" class="cat-list"></div>
    </div>

    <!-- 텍스트 붙여넣기 시트 -->
    <div id="paste-sheet" class="sheet" hidden>
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">✨ 바이브 일정 만들기</h3>
        <p class="sheet-desc">양식은 신경 쓰지 마세요.<br>그대로 붙여넣으면 알아서 분류해 드려요.</p>
        <textarea id="paste-input" class="paste-area" rows="8" placeholder="10시 체크아웃
마루이케 16나한상
점심
加田습원
마트
체크인, 저녁"></textarea>
        <button id="paste-run" class="big-btn" type="button">일정 만들기</button>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="parse-rules.js?v=20260707g"></script>
    <script src="itinerary.js?v=20260707g"></script>
</body>
</html>
