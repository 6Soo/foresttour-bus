<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="프리미엄 여행사 버스 좌석 배치도">
    <title>프리미엄 버스 좌석표 | 여행사</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <nav class="bus-selector">
                <button class="active" data-bus="hiace">
                    <span class="bus-name">Hiace</span>
                    <span class="bus-capacity">14인승</span>
                </button>
                <button data-bus="grandcabin">
                    <span class="bus-name">Grand Cabin</span>
                    <span class="bus-capacity">10인승</span>
                </button>
                <button data-bus="japan24">
                    <span class="bus-name">일본형 소형</span>
                    <span class="bus-capacity">24인승</span>
                </button>
                <button data-bus="korea40">
                    <span class="bus-name">한국형 대형</span>
                    <span class="bus-capacity">40인승</span>
                </button>
            </nav>
        </header>

        <main>
            <div id="capture-area" class="capture-area">
                <div class="trip-header">
                    <h1>숲길따라 감성여행</h1>
                    <h2 id="trip-name" contenteditable="true" data-placeholder="여행 이름 입력 (예: 0827-0829 군산 버스 좌석표)">0827-0829 군산 버스 좌석표</h2>
                </div>

                <div class="layout-wrapper">
                <div class="bus-front-indicator">FRONT</div>
                <div id="bus-view" class="bus-container">
                    <!-- Bus layout will be injected here via JS -->
                </div>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="seat-shape available"></div>
                    <span>일반 좌석</span>
                </div>
                <div class="legend-item">
                    <div class="seat-shape driver"></div>
                    <span>운전석</span>
                </div>
                <div class="legend-item">
                    <div class="seat-shape guide"></div>
                    <span>가이드석</span>
                </div>
                <div class="legend-item">
                    <div class="seat-shape door"></div>
                    <span>출입문</span>
                </div>
            </div>
            </div>
            
            <div class="action-buttons">
                <button id="share-btn" class="share-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    이미지 캡처 및 카카오톡 공유
                </button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
